services:
  postgres:
    image: postgres:16-alpine
    container_name: clocknet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clocknet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - clocknet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clocknet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clocknet-postgres-data:
