services:
  postgres:
    image: postgres:16-alpine
    container_name: clocknet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clocknet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "x8F!k2@Lm9#Qz"
    ports:
      - "55432:5432"
    volumes:
      - clocknet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clocknet"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clocknet-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:x8F!k2@Lm9#Qz@postgres:5432/clocknet?schema=public
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  clocknet-postgres-data:
